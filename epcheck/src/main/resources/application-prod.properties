# ── Production Profile ──
spring.application.name=epcheck

spring.neo4j.uri=${SPRING_NEO4J_URI:bolt://neo4j:7687}
spring.neo4j.authentication.username=${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
spring.neo4j.authentication.password=${SPRING_NEO4J_AUTHENTICATION_PASSWORD:changeme}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

logging.level.com.source.epcheck=WARN
logging.level.org.springframework.data.neo4j=WARN
logging.level.root=WARN

ocr.tessdata-path=
ocr.language=${OCR_LANGUAGE:eng}

ner.confidence-threshold=${NER_CONFIDENCE_THRESHOLD:0.60}

# Actuator — only health + prometheus for prod
management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.metrics.tags.application=epsteinlens

# Rate Limiting — strict for prod
rate-limit.requests-per-minute=10
