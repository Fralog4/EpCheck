spring.application.name=epcheck

# Default active profile (override via SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Neo4j Configuration
spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=notverysecret

# File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.com.source.epcheck=DEBUG
logging.level.org.springframework.data.neo4j=INFO

# OCR (Tesseract) — for scanned PDF fallback
# Leave blank to use Tess4J's bundled tessdata
# Multi-language: eng+fra+spa (requires tessdata installed)
ocr.tessdata-path=
ocr.language=eng

# NER Confidence — filter out low-quality extractions
ner.confidence-threshold=0.60

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Rate Limiting (requests per minute per client IP)
rate-limit.requests-per-minute=60
