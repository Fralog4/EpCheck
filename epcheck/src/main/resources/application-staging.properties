# ── Staging Profile ──
spring.application.name=epcheck

spring.neo4j.uri=${SPRING_NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
spring.neo4j.authentication.password=${SPRING_NEO4J_AUTHENTICATION_PASSWORD:notverysecret}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

logging.level.com.source.epcheck=INFO
logging.level.org.springframework.data.neo4j=WARN

ocr.tessdata-path=
ocr.language=${OCR_LANGUAGE:eng}

ner.confidence-threshold=${NER_CONFIDENCE_THRESHOLD:0.60}

# Actuator — health + metrics + prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized

# Rate Limiting
rate-limit.requests-per-minute=20
